project:
  name: "SAS Migration - Snowflake"
  client: "MAPFRE"

# ── SAS Source ─────────────────────────────────────────────
# Option 1: Filesystem scan (default)
sas_environment:
  source_type: filesystem    # filesystem | odbc | metadata_server
  code_paths:
    - /sas/programs
    - /sas/macros
  data_paths:
    - /sas/data
  log_paths:
    - /sas/logs
  exclude_patterns:
    - backup
    - archive
    - test

# Option 2: ODBC connection (uncomment to use)
# sas_environment:
#   source_type: odbc
#   odbc:
#     dsn: SAS_PROD
#     user: ${SAS_USER}
#     password: ${SAS_PASSWORD}
#   code_paths:
#     - /sas/programs
#   data_paths: []
#   log_paths: []
#   exclude_patterns:
#     - backup

# Option 3: SAS Metadata Server (uncomment to use)
# sas_environment:
#   source_type: metadata_server
#   metadata_server:
#     host: ${SAS_META_HOST}
#     port: 8561
#     user: ${SAS_META_USER}
#     password: ${SAS_META_PASSWORD}
#   code_paths:
#     - /sas/programs
#   data_paths: []
#   log_paths: []
#   exclude_patterns:
#     - backup

# ── Target Platform ────────────────────────────────────────
target:
  platform: snowflake
  account: ${SNOWFLAKE_ACCOUNT}
  user: ${SNOWFLAKE_USER}
  password: ${SNOWFLAKE_PASSWORD}
  warehouse: MIGRATION_WH
  database: SAS_MIGRATION
  role: SYSADMIN

  aws:
    region: us-east-1
    s3_bucket: sas-migration-staging
    s3_prefix: raw/
    iam_role: ${AWS_IAM_ROLE}

# ── Library Mapping ────────────────────────────────────────
library_mapping:
  rawdata:
    database: SAS_MIGRATION
    schema: RAW
  dw:
    database: SAS_MIGRATION
    schema: REFINED

# ── Data Catalog Options ───────────────────────────────────
catalog:
  output_format:
    - json
    - markdown
  detect_pii: true
  infer_domains: true

# ── LLM Integration (optional) ────────────────────────────
llm:
  provider: openai
  api_key_env: OPENAI_API_KEY
  # base_url: https://api.openai.com/v1   # Override for Azure OpenAI or other providers
  models:
    fast: gpt-4o-mini
    balanced: gpt-4o
    powerful: gpt-4o
