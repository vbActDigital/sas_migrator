services:
  sas-migrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sas-migrator
    volumes:
      - ./output:/app/output
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: python tests/run_mvp1_docker.py
